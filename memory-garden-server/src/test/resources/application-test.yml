# 集成测试配置 - H2 内存数据库
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;NON_KEYWORDS=VALUE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/init-badges-h2.sql,classpath:db/init-study-packs-h2.sql
      encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.memorygarden.model.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.memorygarden: debug
